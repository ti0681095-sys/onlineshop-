<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Online Market</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:white;
padding-bottom:100px;
}

/* HEADER */

header{
position:sticky;
top:0;
z-index:999;
background:white;
padding:15px;
display:flex;
align-items:center;
gap:12px;
border-bottom:1px solid #eee;
}

.menu-btn{
font-size:28px;
color:orange;
cursor:pointer;
}

.search-box{
display:flex;
align-items:center;
flex:1;
background:#f3f4f6;
border-radius:12px;
overflow:hidden;
}

.search-box input{
width:100%;
border:none;
outline:none;
padding:12px;
background:transparent;
font-size:16px;
}

.search-box button{
border:none;
background:orange;
color:white;
padding:12px 16px;
font-size:18px;
}

.top-cart{
font-size:26px;
color:orange;
}

/* SIDE MENU */

.menu{
position:fixed;
top:0;
left:-260px;
width:250px;
height:100%;
background:white;
box-shadow:0 0 15px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
z-index:5000;
}

.menu.active{
left:0;
}

.menu h2{
margin-bottom:20px;
color:orange;
}

.menu a{
display:block;
padding:14px;
text-decoration:none;
color:black;
margin-bottom:10px;
border-radius:10px;
background:#f3f4f6;
}

.back-btn{
width:100%;
padding:12px;
border:none;
background:black;
color:white;
border-radius:10px;
margin-top:10px;
}

/* MARKET */

.market-box{
margin:20px;
background:orange;
color:white;
padding:18px;
border-radius:18px;
display:flex;
align-items:center;
gap:15px;
}

.market-box i{
font-size:35px;
}

.market-box h2{
font-size:28px;
}

/* SECTION */

.section-title{
padding:0 20px;
font-size:30px;
font-weight:bold;
margin-bottom:15px;
}

/* TOP LIST */

.slider{
display:flex;
overflow-x:auto;
padding:0 20px 20px;
gap:15px;
}

.slider::-webkit-scrollbar{
display:none;
}

.no-product{
min-width:260px;
padding:30px;
background:#f3f4f6;
border-radius:20px;
text-align:center;
font-size:20px;
}

/* PRODUCTS */

.products{
padding:20px;
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card-content h3{
margin-bottom:10px;
font-size:20px;
}

.price{
color:orange;
font-size:22px;
font-weight:bold;
margin-bottom:12px;
}

.btn-group{
display:flex;
flex-direction:column;
gap:10px;
}

.buy-btn,
.cart-btn,
.details-btn{
border:none;
padding:12px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.buy-btn{
background:orange;
color:white;
}

.cart-btn{
background:black;
color:white;
}

.details-btn{
background:#f3f4f6;
}

/* ADMIN */

.admin-btn{
display:none;
margin:20px;
width:calc(100% - 40px);
padding:15px;
border:none;
background:orange;
color:white;
border-radius:12px;
font-size:18px;
}

.admin-panel{
display:none;
padding:20px;
}

.admin-panel button{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
background:orange;
color:white;
border-radius:12px;
font-size:17px;
}

/* DETAILS PAGE */

.details-page{
display:none;
padding:20px;
}

.details-page img{
width:100%;
border-radius:20px;
margin-bottom:20px;
}

.details-page h2{
margin-bottom:15px;
}

.details-page p{
font-size:18px;
margin-bottom:20px;
}

.details-back{
padding:14px;
width:100%;
border:none;
background:orange;
color:white;
border-radius:12px;
font-size:18px;
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:orange;
display:flex;
justify-content:space-around;
padding:12px 0;
z-index:999;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
color:white;
font-size:14px;
}

.nav-item i{
font-size:22px;
margin-bottom:5px;
}

</style>
</head>

<body>

<!-- MENU -->

<div class="menu"
id="menu">

<h2>Menu</h2>

<a href="#">Account</a>
<a href="#">Buy</a>
<a href="#">Cart</a>
<a href="#">Support</a>
<a href="#">Details</a>

<button class="back-btn"
onclick="closeMenu()">
BACK
</button>

</div>

<!-- HEADER -->

<header>

<div class="menu-btn"
onclick="openMenu()">

<i class="fas fa-bars"></i>

</div>

<div class="search-box">

<input type="text"
id="searchInput"
placeholder="Search products..."
oninput="checkAdmin()">

<button onclick="searchProduct()">

<i class="fas fa-search"></i>

</button>

</div>

<div class="top-cart">

<i class="fas fa-cart-shopping"></i>

</div>

</header>

<!-- ADMIN BUTTON -->

<button class="admin-btn"
id="adminBtn"
onclick="adminLogin()">

Admin Login

</button>

<!-- MARKET -->

<div class="market-box">

<i class="fas fa-store"></i>

<h2>Online Market</h2>

</div>

<!-- TOP LIST -->

<div class="section-title">
TOP LIST
</div>

<div class="slider"
id="topList">

<div class="no-product">
No Product
</div>

</div>

<!-- PRODUCTS -->

<div class="section-title">
Products
</div>

<div class="products"
id="productList">

<!-- EMPTY -->

</div>

<!-- DETAILS PAGE -->

<div class="details-page"
id="detailsPage">

<img id="detailsImg">

<h2 id="detailsName"></h2>

<p id="detailsPrice"></p>

<p id="detailsText"></p>

<button class="details-back"
onclick="backHome()">

Back

</button>

</div>

<!-- ADMIN PANEL -->

<div class="admin-panel"
id="adminPanel">

<button onclick="changePassword()">
Change Password
</button>

<button onclick="addProduct()">
Ad Post
</button>

<button onclick="editDelete()">
Edit/Delete Post
</button>

<button onclick="addTopProduct()">
Top Product Ad
</button>

<button onclick="viewOrders()">
View Order
</button>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

<div class="nav-item"
onclick="goHome()">

<i class="fas fa-house"></i>
HOME

</div>

<div class="nav-item"
onclick="goBuy()">

<i class="fas fa-bag-shopping"></i>
BUY

</div>

<div class="nav-item">

<i class="fas fa-cart-shopping"></i>
CART

</div>

<div class="nav-item">

<i class="fas fa-user"></i>
ACCOUNT

</div>

</div>

<script>

let adminPassword = "tamim31";

let products = [];

/* LOAD PRODUCT */

function loadProducts(){

let list =
document.getElementById("productList");

list.innerHTML = "";

if(products.length==0){

list.innerHTML =
"<div class='no-product'>No Product</div>";

return;

}

products.forEach((p,index)=>{

list.innerHTML += `

<div class="card">

<img src="${p.img}">

<div class="card-content">

<h3>${p.name}</h3>

<div class="price">
৳ ${p.price}
</div>

<div class="btn-group">

<button class="buy-btn"
onclick="buyNow()">
Buy
</button>

<button class="cart-btn"
onclick="addCart()">
Add To Cart
</button>

<button class="details-btn"
onclick="showDetails(${index})">
Details
</button>

</div>

</div>

</div>

`;

});

}

loadProducts();

/* MENU */

function openMenu(){

document
.getElementById("menu")
.classList.add("active");

}

function closeMenu(){

document
.getElementById("menu")
.classList.remove("active");

}

/* SEARCH */

function searchProduct(){

let input =
document.getElementById("searchInput")
.value.toLowerCase();

let cards =
document.querySelectorAll(".card");

cards.forEach(card=>{

let title =
card.querySelector("h3")
.innerText.toLowerCase();

if(title.includes(input)){

card.style.display="block";

}else{

card.style.display="none";

}

});

}

/* ADMIN */

function checkAdmin(){

let input =
document.getElementById("searchInput")
.value.toLowerCase();

if(input=="adminpenal"){

document
.getElementById("adminBtn")
.style.display="block";

}else{

document
.getElementById("adminBtn")
.style.display="none";

}

}

function adminLogin(){

let pass =
prompt("Password");

if(pass==adminPassword){

document
.getElementById("adminPanel")
.style.display="block";

alert("Login Success");

}else{

alert("Wrong Password");

}

}

function changePassword(){

let newPass =
prompt("New Password");

if(newPass){

adminPassword = newPass;

alert("Password Changed");

}

}

/* ADD PRODUCT */

function addProduct(){

let name =
prompt("Product Name");

let price =
prompt("Price");

let img =
prompt("Image Link");

let details =
prompt("Details");

products.push({

name:name,
price:price,
img:img,
details:details

});

loadProducts();

alert("Product Uploaded");

}

/* EDIT DELETE */

function editDelete(){

let index =
prompt("Product Number Start 0");

let action =
prompt("edit/delete");

if(action=="delete"){

products.splice(index,1);

loadProducts();

alert("Deleted");

}

if(action=="edit"){

products[index].name =
prompt("New Name");

products[index].price =
prompt("New Price");

products[index].details =
prompt("New Details");

loadProducts();

alert("Edited");

}

}

/* TOP PRODUCT */

function addTopProduct(){

let name =
prompt("Product Name");

let price =
prompt("Price");

let img =
prompt("Image Link");

document
.getElementById("topList")
.innerHTML += `

<div class="card"
style="min-width:260px;">

<img src="${img}">

<div class="card-content">

<h3>${name}</h3>

<div class="price">
৳ ${price}
</div>

</div>

</div>

`;

}

/* DETAILS PAGE */

function showDetails(index){

let p = products[index];

document
.getElementById("detailsImg")
.src = p.img;

document
.getElementById("detailsName")
.innerText = p.name;

document
.getElementById("detailsPrice")
.innerText = "৳ " + p.price;

document
.getElementById("detailsText")
.innerText = p.details;

document
.getElementById("detailsPage")
.style.display = "block";

document
.getElementById("productList")
.style.display = "none";

}

function backHome(){

document
.getElementById("detailsPage")
.style.display = "none";

document
.getElementById("productList")
.style.display = "grid";

}

/* BUY */

function buyNow(){

alert("Order Success");

}

function addCart(){

alert("Added To Cart");

}

/* VIEW ORDER */

function viewOrders(){

alert("No Orders");

}

/* NAV */

function goHome(){

window.scrollTo(0,0);

}

function goBuy(){

document
.getElementById("productList")
.scrollIntoView();

}

</script>

</body>
</html>
