<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Online Market</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:white;
padding-bottom:90px;
}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px;
background:white;
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid #eee;
}

.left-header{
display:flex;
align-items:center;
gap:15px;
}

/* MENU */

.menu-btn{
font-size:28px;
color:orange;
cursor:pointer;
}

.menu{
position:fixed;
top:0;
left:-260px;
width:250px;
height:100%;
background:white;
box-shadow:0 0 15px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
z-index:2000;
}

.menu.active{
left:0;
}

.menu h2{
margin-bottom:20px;
color:orange;
}

.menu a{
display:block;
padding:14px;
text-decoration:none;
color:#333;
border-radius:10px;
margin-bottom:10px;
font-size:18px;
transition:0.3s;
}

.menu a:hover{
background:orange;
color:white;
}

/* SEARCH */

.search-box{
display:flex;
align-items:center;
background:#f3f4f6;
border-radius:12px;
overflow:hidden;
width:100%;
max-width:400px;
}

.search-box input{
border:none;
outline:none;
padding:12px;
width:100%;
background:transparent;
font-size:16px;
}

.search-box button{
border:none;
background:orange;
color:white;
padding:12px 18px;
font-size:18px;
cursor:pointer;
}

/* TOP CART */

.top-cart{
font-size:28px;
color:orange;
cursor:pointer;
}

/* ONLINE MARKET */

.market-box{
margin:20px;
background:orange;
padding:15px;
border-radius:15px;
display:flex;
align-items:center;
gap:12px;
color:white;
}

.market-box i{
font-size:35px;
}

.market-box h2{
font-size:24px;
}

/* TOP LIST */

.section-title{
padding:0 20px;
margin-top:10px;
margin-bottom:15px;
font-size:28px;
font-weight:bold;
}

/* SLIDER */

.slider{
display:flex;
overflow-x:auto;
gap:15px;
padding:0 20px 20px;
scroll-behavior:smooth;
}

.slider::-webkit-scrollbar{
display:none;
}

.slide-card{
min-width:280px;
background:#fff;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.slide-card img{
width:100%;
height:180px;
object-fit:cover;
}

.slide-info{
padding:15px;
}

.slide-info h3{
margin-bottom:10px;
}

.slide-info p{
color:orange;
font-size:20px;
margin-bottom:10px;
}

/* PRODUCTS */

.products{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.card-content{
padding:12px;
}

.card-content h3{
font-size:18px;
margin-bottom:8px;
}

.price{
color:orange;
font-size:20px;
margin-bottom:10px;
font-weight:bold;
}

.btn-group{
display:flex;
flex-direction:column;
gap:10px;
}

.buy-btn,
.cart-btn{
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
font-size:15px;
font-weight:bold;
}

.buy-btn{
background:orange;
color:white;
}

.cart-btn{
background:#111;
color:white;
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:orange;
display:flex;
justify-content:space-around;
padding:10px 0;
z-index:3000;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
font-size:14px;
color:white;
cursor:pointer;
}

.nav-item i{
font-size:22px;
margin-bottom:5px;
}

/* NO PRODUCT */

.no-product{
padding:20px;
text-align:center;
font-size:18px;
color:#888;
}

</style>
</head>

<body>

<!-- SIDE MENU -->

<div class="menu" id="menu">

<h2>Menu</h2>

<a href="#"><i class="fas fa-user"></i> Account</a>

<a href="#"><i class="fas fa-bag-shopping"></i> Buy</a>

<a href="#"><i class="fas fa-cart-shopping"></i> Cart</a>

<a href="#"><i class="fas fa-headset"></i> Support</a>

<a href="#"><i class="fas fa-circle-info"></i> Details</a>

</div>

<!-- HEADER -->

<header>

<div class="left-header">

<div class="menu-btn" onclick="openMenu()">
<i class="fas fa-bars"></i>
</div>

</div>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search products...">

<button onclick="searchProduct()">
<i class="fas fa-search"></i>
</button>

</div>

<div class="top-cart">
<i class="fas fa-cart-shopping"></i>
</div>

</header>

<!-- ONLINE MARKET -->

<div class="market-box">

<i class="fas fa-store"></i>

<h2>Online Market</h2>

</div>

<!-- TOP LIST -->

<div class="section-title">
TOP LIST
</div>

<div class="slider">

<div class="slide-card">

<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1000">

<div class="slide-info">

<h3>Running Shoes</h3>

<p>$79</p>

</div>

</div>

<div class="slide-card">

<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1000">

<div class="slide-info">

<h3>Headphone</h3>

<p>$99</p>

</div>

</div>

<div class="slide-card">

<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1000">

<div class="slide-info">

<h3>Smart Phone</h3>

<p>$699</p>

</div>

</div>

</div>

<!-- PRODUCT LIST -->

<div class="section-title">
Products
</div>

<div class="products" id="productList">

<!-- PRODUCT -->

<div class="card">

<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1000">

<div class="card-content">

<h3>Running Shoes</h3>

<div class="price">$79</div>

<div class="btn-group">

<button class="buy-btn"
onclick="buyNow()">
Buy
</button>

<button class="cart-btn"
onclick="addCart()">
Add To Cart
</button>

</div>

</div>

</div>

<!-- PRODUCT -->

<div class="card">

<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1000">

<div class="card-content">

<h3>Headphone</h3>

<div class="price">$99</div>

<div class="btn-group">

<button class="buy-btn"
onclick="buyNow()">
Buy
</button>

<button class="cart-btn"
onclick="addCart()">
Add To Cart
</button>

</div>

</div>

</div>

<!-- PRODUCT -->

<div class="card">

<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1000">

<div class="card-content">

<h3>Smart Phone</h3>

<div class="price">$699</div>

<div class="btn-group">

<button class="buy-btn"
onclick="buyNow()">
Buy
</button>

<button class="cart-btn"
onclick="addCart()">
Add To Cart
</button>

</div>

</div>

</div>

<!-- PRODUCT -->

<div class="card">

<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1000">

<div class="card-content">

<h3>Smart Watch</h3>

<div class="price">$120</div>

<div class="btn-group">

<button class="buy-btn"
onclick="buyNow()">
Buy
</button>

<button class="cart-btn"
onclick="addCart()">
Add To Cart
</button>

</div>

</div>

</div>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

<div class="nav-item">
<i class="fas fa-house"></i>
HOME
</div>

<div class="nav-item">
<i class="fas fa-bag-shopping"></i>
BUY
</div>

<div class="nav-item">
<i class="fas fa-cart-shopping"></i>
CART
</div>

<div class="nav-item">
<i class="fas fa-user"></i>
ACCOUNT
</div>

</div>

<!-- JAVASCRIPT -->

<script>

function openMenu(){

document
.getElementById("menu")
.classList.toggle("active");

}

function buyNow(){

alert("Product Buy Success ✅");

}

function addCart(){

alert("Added To Cart 🛒");

}

function searchProduct(){

let input =
document.getElementById("searchInput")
.value.toLowerCase();

let cards =
document.querySelectorAll(".card");

cards.forEach(card => {

let title =
card.querySelector("h3")
.innerText.toLowerCase();

if(title.includes(input)){

card.style.display="block";

}else{

card.style.display="none";

}

});

}

</script>

</body>
</html>
