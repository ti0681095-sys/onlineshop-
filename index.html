<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Online Shop</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
    }

    header{
      background:#111;
      color:white;
      padding:20px;
      text-align:center;
    }

    header h1{
      font-size:32px;
    }

    nav{
      margin-top:10px;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin:0 10px;
      font-size:18px;
    }

    .hero{
      background:linear-gradient(to right,#111,#444);
      color:white;
      text-align:center;
      padding:60px 20px;
    }

    .hero h2{
      font-size:40px;
      margin-bottom:10px;
    }

    .hero p{
      font-size:18px;
    }

    .products{
      padding:40px 20px;
    }

    .products h2{
      text-align:center;
      margin-bottom:30px;
      font-size:32px;
    }

    .product-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
    }

    .card{
      background:white;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .card img{
      width:100%;
      height:250px;
      object-fit:cover;
    }

    .card-content{
      padding:15px;
      text-align:center;
    }

    .card-content h3{
      margin-bottom:10px;
      font-size:22px;
    }

    .price{
      color:green;
      font-size:20px;
      margin-bottom:15px;
    }

    button{
      background:#111;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:5px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#ff6600;
    }

    footer{
      background:#111;
      color:white;
      text-align:center;
      padding:20px;
      margin-top:40px;
    }
  </style>
</head>

<body>

  <header>
    <h1>My Online Shop</h1>

    <nav>
      <a href="#">Home</a>
      <a href="#">Products</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Welcome To My Shop 🛒</h2>
    <p>Best Products With Best Prices</p>
  </section>

  <section class="products">

    <h2>Featured Products</h2>

    <div class="product-grid">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1000" alt="">
        <div class="card-content">
          <h3>Running Shoes</h3>
          <p class="price">$49</p>
          <button onclick="buyNow()">Buy Now</button>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1000" alt="">
        <div class="card-content">
          <h3>Smart Watch</h3>
          <p class="price">$89</p>
          <button onclick="buyNow()">Buy Now</button>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1000" alt="">
        <div class="card-content">
          <h3>iPhone</h3>
          <p class="price">$699</p>
          <button onclick="buyNow()">Buy Now</button>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1000" alt="">
        <div class="card-content">
          <h3>Headphone</h3>
          <p class="price">$39</p>
          <button onclick="buyNow()">Buy Now</button>
        </div>
      </div>

    </div>

  </section>

  <footer>
    <p>© 2026 My Online Shop | All Rights Reserved</p>
  </footer>

  <script>
    function buyNow(){
      alert("Product Added Successfully 🛒");
    }
  </script>

</body>
</html>
