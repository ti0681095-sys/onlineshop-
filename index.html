<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Online Market</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:white;
padding-bottom:100px;
}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px;
background:white;
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid #eee;
}

.menu-btn{
font-size:28px;
color:orange;
cursor:pointer;
}

.top-cart{
font-size:28px;
color:orange;
cursor:pointer;
}

/* SEARCH */

.search-box{
display:flex;
align-items:center;
background:#f3f4f6;
border-radius:12px;
overflow:hidden;
width:100%;
max-width:400px;
}

.search-box input{
border:none;
outline:none;
padding:12px;
width:100%;
background:transparent;
font-size:16px;
}

.search-box button{
border:none;
background:orange;
color:white;
padding:12px 18px;
cursor:pointer;
font-size:18px;
}

/* MENU */

.menu{
position:fixed;
top:0;
left:-260px;
width:250px;
height:100%;
background:white;
box-shadow:0 0 20px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
z-index:9999;
}

.menu.active{
left:0;
}

.menu h2{
color:orange;
margin-bottom:20px;
}

.menu a{
display:block;
padding:14px;
text-decoration:none;
color:#333;
margin-bottom:10px;
border-radius:10px;
font-size:18px;
transition:0.3s;
}

.menu a:hover{
background:orange;
color:white;
}

.back-btn{
background:black;
color:white;
padding:12px;
border:none;
width:100%;
border-radius:10px;
margin-top:15px;
font-size:16px;
}

/* ONLINE MARKET */

.market-box{
margin:20px;
background:orange;
padding:16px;
border-radius:16px;
display:flex;
align-items:center;
gap:15px;
color:white;
}

.market-box i{
font-size:35px;
}

.market-box h2{
font-size:28px;
}

/* SECTION */

.section-title{
padding:0 20px;
font-size:30px;
font-weight:bold;
margin-bottom:15px;
}

/* TOP PRODUCT */

.slider{
display:flex;
overflow-x:auto;
gap:15px;
padding:0 20px 20px;
scroll-behavior:smooth;
}

.slider::-webkit-scrollbar{
display:none;
}

.slide-card{
min-width:260px;
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.slide-card img{
width:100%;
height:180px;
object-fit:cover;
}

.slide-info{
padding:15px;
}

.slide-info h3{
margin-bottom:10px;
}

.slide-info p{
color:orange;
font-size:20px;
font-weight:bold;
}

/* PRODUCTS */

.products{
padding:20px;
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card-content h3{
font-size:20px;
margin-bottom:10px;
}

.price{
color:orange;
font-size:22px;
font-weight:bold;
margin-bottom:12px;
}

.btn-group{
display:flex;
flex-direction:column;
gap:10px;
}

.buy-btn,
.cart-btn,
.details-btn{
border:none;
padding:11px;
border-radius:12px;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

.buy-btn{
background:orange;
color:white;
}

.cart-btn{
background:#111;
color:white;
}

.details-btn{
background:#f3f4f6;
}

/* ADMIN */

.admin-btn{
margin:20px;
padding:14px;
background:orange;
color:white;
border:none;
border-radius:12px;
width:calc(100% - 40px);
font-size:18px;
display:none;
}

/* ADMIN PANEL */

.admin-panel{
display:none;
padding:20px;
}

.admin-panel button{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
background:orange;
color:white;
font-size:17px;
border-radius:12px;
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:orange;
display:flex;
justify-content:space-around;
padding:12px 0;
z-index:5000;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
color:white;
font-size:14px;
cursor:pointer;
}

.nav-item i{
font-size:22px;
margin-bottom:5px;
}

</style>
</head>

<body>

<!-- MENU -->

<div class="menu" id="menu">

<h2>Menu</h2>

<a href="#">Account</a>
<a href="#">Buy</a>
<a href="#">Cart</a>
<a href="#">Support</a>
<a href="#">Details</a>

<button class="back-btn"
onclick="closeMenu()">
BACK
</button>

</div>

<!-- HEADER -->

<header>

<div class="menu-btn"
onclick="openMenu()">

<i class="fas fa-bars"></i>

</div>

<div class="search-box">

<input type="text"
id="searchInput"
placeholder="Search products..."
oninput="checkAdmin()">

<button onclick="searchProduct()">

<i class="fas fa-search"></i>

</button>

</div>

<div class="top-cart">

<i class="fas fa-cart-shopping"></i>

</div>

</header>

<!-- ADMIN LOGIN BUTTON -->

<button class="admin-btn"
id="adminBtn"
onclick="adminLogin()">

Admin Login

</button>

<!-- ONLINE MARKET -->

<div class="market-box">

<i class="fas fa-store"></i>

<h2>Online Market</h2>

</div>

<!-- TOP LIST -->

<div class="section-title">
TOP LIST
</div>

<div class="slider" id="topList">

<div class="slide-card">

<img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?q=80&w=1000">

<div class="slide-info">

<h3>Premium Shoes</h3>

<p>৳ 2500</p>

</div>

</div>

</div>

<!-- PRODUCT LIST -->

<div class="section-title">
Products
</div>

<div class="products"
id="productList">

</div>

<!-- ADMIN PANEL -->

<div class="admin-panel"
id="adminPanel">

<button onclick="changePassword()">
Change Password
</button>

<button onclick="addProduct()">
Ad Post
</button>

<button onclick="editDelete()">
Edit/Delete Post
</button>

<button onclick="addTopProduct()">
Top Product Ad
</button>

<button onclick="viewOrders()">
View Order
</button>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

<div class="nav-item"
onclick="goHome()">

<i class="fas fa-house"></i>
HOME

</div>

<div class="nav-item"
onclick="goBuy()">

<i class="fas fa-bag-shopping"></i>
BUY

</div>

<div class="nav-item">

<i class="fas fa-cart-shopping"></i>
CART

</div>

<div class="nav-item">

<i class="fas fa-user"></i>
ACCOUNT

</div>

</div>

<script>

/* DEFAULT PASSWORD */

let adminPassword = "tamim31";

/* PRODUCT DATA */

let products = [

{
name:"Gaming Mouse",
price:"৳ 1200",
img:"https://images.unsplash.com/photo-1527814050087-3793815479db?q=80&w=1000",
details:"RGB Gaming Mouse"
},

{
name:"Wireless Headphone",
price:"৳ 3200",
img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1000",
details:"Premium Sound"
}

];

/* LOAD PRODUCTS */

function loadProducts(){

let list =
document.getElementById("productList");

list.innerHTML = "";

products.forEach((p,index)=>{

list.innerHTML += `

<div class="card">

<img src="${p.img}">

<div class="card-content">

<h3>${p.name}</h3>

<div class="price">${p.price}</div>

<div class="btn-group">

<button class="buy-btn"
onclick="buyNow()">
Buy
</button>

<button class="cart-btn"
onclick="addCart()">
Add To Cart
</button>

<button class="details-btn"
onclick="showDetails('${p.details}')">
Details
</button>

</div>

</div>

</div>

`;

});

}

loadProducts();

/* MENU */

function openMenu(){

document
.getElementById("menu")
.classList.add("active");

}

function closeMenu(){

document
.getElementById("menu")
.classList.remove("active");

}

/* BUY */

function buyNow(){

alert("Order Success ✅");

}

function addCart(){

alert("Added To Cart 🛒");

}

function showDetails(text){

alert(text);

}

/* SEARCH */

function searchProduct(){

let input =
document.getElementById("searchInput")
.value.toLowerCase();

let cards =
document.querySelectorAll(".card");

cards.forEach(card=>{

let title =
card.querySelector("h3")
.innerText.toLowerCase();

if(title.includes(input)){

card.style.display="block";

}else{

card.style.display="none";

}

});

}

/* ADMIN */

function checkAdmin(){

let input =
document.getElementById("searchInput")
.value.toLowerCase();

if(input=="adminpenal"){

document
.getElementById("adminBtn")
.style.display="block";

}else{

document
.getElementById("adminBtn")
.style.display="none";

}

}

function adminLogin(){

let pass =
prompt("Enter Password");

if(pass==adminPassword){

alert("Login Success ✅");

document
.getElementById("adminPanel")
.style.display="block";

window.scrollTo(0,
document.body.scrollHeight);

}else{

alert("Wrong Password ❌");

}

}

/* CHANGE PASSWORD */

function changePassword(){

let newPass =
prompt("New Password");

if(newPass){

adminPassword = newPass;

alert("Password Changed ✅");

}

}

/* ADD PRODUCT */

function addProduct(){

let name =
prompt("Product Name");

let price =
prompt("Price");

let img =
prompt("Image Link");

let details =
prompt("Details");

products.push({

name:name,
price:"৳ "+price,
img:img,
details:details

});

loadProducts();

alert("Uploaded ✅");

}

/* EDIT DELETE */

function editDelete(){

let index =
prompt("Product Number Start From 0");

let action =
prompt("edit/delete");

if(action=="delete"){

products.splice(index,1);

loadProducts();

alert("Deleted");

}

if(action=="edit"){

products[index].name =
prompt("New Name");

products[index].price =
"৳ "+prompt("New Price");

loadProducts();

alert("Edited");

}

}

/* TOP PRODUCT */

function addTopProduct(){

let name =
prompt("Product Name");

let price =
prompt("Price");

let img =
prompt("Image Link");

document
.getElementById("topList")
.innerHTML += `

<div class="slide-card">

<img src="${img}">

<div class="slide-info">

<h3>${name}</h3>

<p>৳ ${price}</p>

</div>

</div>

`;

}

/* ORDER */

function viewOrders(){

alert("No Orders Yet");

}

/* NAV */

function goHome(){

window.scrollTo(0,0);

}

function goBuy(){

document
.getElementById("productList")
.scrollIntoView();

}

</script>

</body>
</html>
